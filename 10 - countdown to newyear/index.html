<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calc</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css.map">
    <link rel="stylesheet" href="style.css">
</head>
<body class="vh-100 d-flex justify-content-center align-items-center">

    

    <div class="card bg-black text-white p-5 w-auto rounded-3 w-75">
        <h1 class="fw-bold my-0">Countdown To New Year</h1>
        <div class="w-100 d-flex flex-column justify-content-cente align-content-center">
            <div class="w-100 mb-2 mt-3 text-center">
                 it's :
                 <span class="year">2000</span>
            </div>
            <div class="month d-flex mx-auto w-auto overflow-hidden rounded rounded-2 fs-6 text-capitalize">
                <div class="days bg-light p-2 px-3 text-black d-flex flex-column align-items-center">
                    <span class="numDay fs-4 my-0">00</span>
                    <span>days</span>
                </div>
                <div class="days bg-light p-2 px-3 text-black d-flex flex-column align-items-center">
                    <span class="numHours fs-4 my-0">00</span>
                    <span>Hours</span>
                </div>            
                <div class="days bg-light p-2 px-3 text-black d-flex flex-column align-items-center">
                    <span class="numMin fs-4 my-0">00</span>
                    <span>Minits</span>
                </div>
                <div class="days bg-light p-2 px-3 text-black d-flex flex-column align-items-center">
                    <span class="numSac fs-4 my-0">00</span>
                    <span>Sacand</span>
                </div>
            </div>
        </div>
    </div>




    <script src="app.js"></script>
    <script src="js/all.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <!-- <script src="js/bootstrap.bundle.min.js.map"></script> -->
</body>
</html>
