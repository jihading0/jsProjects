<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css.map">
    <link rel="stylesheet" href="style.css">
</head>
<body class="vh-100 d-flex justify-content-center align-items-center">

    

    <div class="card text-white p-5 rounded-3 border-0 ">
        <h1 class="fw-bold my-0">Weather app</h1>
        
        <form class="Weather d-flex gap-2 mt-2">
            <input type="text" class="form-control input border-0 inputSearch" placeholder="Enter City" value="">
            <button class="btn btn-light btnSearch">search</button>
        </form>

        <div class="WeatherData d-flex flex-column align-items-center">

            <div class="icon sun my-3 " style="font-size: 5rem;">
                <i class="fa-solid fa-sun text-warning"></i>
            </div>
            
            <div class="tempr fs-1 fw-bold">22 °C</div>
            <div class="descr fs-1 text-uppercase">Sunny</div>

            <div class="deteils d-flex gap-2 my-2 justify-content-center align-content-center align-items-center text-black">
                <div class="bg-light p-2 px-3 rounded">Feel Like : 23 °C </div>
                <div class="bg-light p-2 px-3 rounded">Humidity : 40%  </div>
                <div class="bg-light p-2 px-3 rounded">Wind Speed : 5 m/s</div>
            </div>

 

            
            
        </div>


    </div>




    <script src="app.js"></script>
    <script src="js/all.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <!-- <script src="js/bootstrap.bundle.min.js.map"></script> -->
</body>
</html>
