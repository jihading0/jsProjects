<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap.min.css.map">
    <link rel="stylesheet" href="style.css">
</head>
<body class="vh-100 d-flex justify-content-center align-items-center">

    

    <div class="bg-black text-white p-5 w-auto rounded-3">
        <h3>Random Password Generator</h3>
        <div class="position-relative mt-2">
            <input type="text" class="form-control output" disabled value="" placeholder="Create a Password">
            <div class="copy-icon ">
                <i class=" fa-regular fa-copy position-absolute top-50 end-0 translate-middle text-black"></i>
            </div>
        </div>
        <button class="btn btn-dark mt-3 genbtn">Generate</button>
        <div class="alert active alert-light my-3 py-2">Password is copyed</div>
    </div>




    <script src="app.js"></script>
    <script src="js/all.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <!-- <script src="js/bootstrap.bundle.min.js.map"></script> -->
</body>
</html>
